# iOS version major changes
"1":
  changes: "Official name: iPhone OS"
"2":
  changes: |-
    Official name: iPhone OS 2.0
    * First public SDK
    * Launch of App Store
"3":
  changes: |-
    Official name: iPhone OS 3.0
    * Cut, copy and paste
    * VoiceOver
    * Spotlight
    * APNs
    * In-App Purchases
"4":

    * Siri
    * iCloud
    * iMessage
    * ARC
    * UIKit storyboards
"6":
  changes: |-
    * Auto Layout
    * Apple Maps & Wallet
    * Do Not Disturb
    * LTE support
"7":
  changes: |-
